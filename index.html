<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">

    <section class="timer">
        <span>01</span> : <span>00</span>
    </section>

    <section class="questionlist"></section>

    <section>
        <form id="form">
            <button class="pre no-cursor">Previous</button>
            <button class="btn">Submit</button>
            <button class="next">Next</button>
        </form>
    </section>
</div>
<div class="finalans"></div>
<script src="script.js"></script>
</body>
</html>
